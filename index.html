<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Telegram Mini App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg-color: #0f1123;
            --card-bg: #1a1b36;
            --primary: #21cd6e; /* Yeşil Buton Rengi */
            --text-main: #ffffff;
            --text-muted: #8b8ea1;
            --accent: #8b3dff; /* Mor Vurgu */
            --accent-glow: rgba(139, 61, 255, 0.4);
            --border-color: #2a2c4e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .main-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            padding-bottom: 90px; /* Alttaki bar için boşluk */
        }

        /* Reward Box */
        .reward-card {
            background: linear-gradient(180deg, #181938 0%, #111228 100%);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .reward-header h2 {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .reward-header p {
            color: #5bb5ff;
            font-size: 13px;
            margin-bottom: 20px;
        }

        /* List */
        .day-list {
            background-color: #1c1d3c;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .day-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .day-row:last-child {
            border-bottom: none;
        }

        .day-row.active {
            background-color: var(--accent);
            font-weight: 600;
        }

        .day-row .points {
            color: #ffd700;
            font-weight: 600;
        }
        
        .day-row.active .points {
            color: #ffffff;
        }

        .reward-note {
            color: var(--text-muted);
            font-size: 11px;
            text-align: left;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .claim-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(33, 205, 110, 0.3);
            transition: transform 0.1s;
        }

        .claim-btn:active {
            transform: scale(0.97);
        }

        /* Bottom Tab Navigator */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #0b0c19;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            padding-bottom: env(safe-area-inset-bottom, 15px); /* iOS için güvenli alan */
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 11px;
            transition: color 0.2s;
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item.active {
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <!-- THE REI BRANDING HEADER -->
        <div style="text-align: center; margin-bottom: 25px; padding-top: 10px;">
            <i class="fa-solid fa-crown" style="color: #f7b731; font-size: 42px; display: block; margin-bottom: 8px; filter: drop-shadow(0 0 10px rgba(247,183,49,0.5));"></i>
            <h1 style="color: white; font-size: 34px; font-weight: 800; letter-spacing: 1.5px; font-family: 'Outfit', 'Inter', sans-serif;">TheRei</h1>
        </div>

        <div class="reward-card">
            <div class="reward-header">
                <h2>🎁 Günlük Seri Ödülleri</h2>
                <p>Mevcut serin: 1 gün. Sıradaki ödülün vurgulandı.</p>
            </div>

            <div class="day-list">
                <div class="day-row">
                    <span>Seri</span>
                    <span>Ödül</span>
                </div>
                <div class="day-row active">
                    <span>Gün 1</span>
                    <span class="points">300 Puan</span>
                </div>
                <div class="day-row">
                    <span>Gün 2</span>
                    <span class="points">400 Puan</span>
                </div>
                <div class="day-row">
                    <span>Gün 3</span>
                    <span class="points">500 Puan</span>
                </div>
                <div class="day-row">
                    <span>Gün 4</span>
                    <span class="points">600 Puan</span>
                </div>
                <div class="day-row">
                    <span>Gün 5</span>
                    <span class="points">700 Puan</span>
                </div>
                <div class="day-row">
                    <span>Gün 6</span>
                    <span class="points">800 Puan</span>
                </div>
                <div class="day-row">
                    <span>Gün 7</span>
                    <span class="points">900 Puan</span>
                </div>
                <div class="day-row">
                    <span>Gün 8+</span>
                    <span class="points">1,000 Puan</span>
                </div>
            </div>

            <p class="reward-note">Not: Bir gün atlarsan seri başa döner.</p>

            <button class="claim-btn" id="claimBtn" onclick="claimReward()">Ödülü Al (+300 P)</button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <i class="fa-solid fa-house"></i>
            <span>Ana Sayfa</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-rocket"></i>
            <span>Oyunlar</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-regular fa-comments"></i>
            <span>Sohbet</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-list-check"></i>
            <span>Görevler</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-regular fa-user"></i>
            <span>Profil</span>
        </a>
    </nav>

    <script>
        // Telegram altyapısını başlat
        const tg = window.Telegram.WebApp;
        tg.expand(); // Ekranı tam boyuta genişlet

        // Uygulamanın temasını telegram rengine uydurmak istersek (isteğe bağlı)
        // tg.backgroundColor = '#0f1123';
        // tg.headerColor = '#0f1123';
        
        // Ödül alma fonksiyonu
        function claimReward() {
            // Telegram Bot'a veri gönderip pencereyi kapatma örneği
            const btn = document.getElementById("claimBtn");
            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> İşleniyor...";
            btn.style.backgroundColor = "#1b9b53";
            
            setTimeout(() => {
                btn.innerHTML = "<i class='fa-solid fa-check'></i> 300 Puan Alındı!";
                
                // Telegram Web App API üzerinden arka planda bota mesaj yollayabiliriz.
                // Burada botunuza bildirim atmak istiyorsak: (Sadece özel şartlarda çalışır)
                // tg.sendData("CLAIM_300");
                
                // Haptic feedback (Vibrasyon)
                tg.HapticFeedback.notificationOccurred("success");
                
            }, 1000);
        }
    </script>
</body>
</html>
